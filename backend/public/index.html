<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>My Portfolio</h1>
    <p>Welcome to my personal portfolio website</p>
  </header>

  <section id="about">
    <h2>About Me</h2>
    <p>
      Hello! I am a developer passionate about web development and building modern websites.
    </p>
  </section>

  <section id="projects">
    <h2>Projects</h2>
    <div class="project-card">
      <h3>Portfolio Website</h3>
      <p>A personal portfolio website built using HTML, CSS, JavaScript, Node.js, and PostgreSQL.</p>
    </div>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>

    <form id="contact-form">
      <input
        type="text"
        id="name"
        name="name"
        placeholder="Enter your name"
        required
      />

      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
        required
      />

      <textarea
        id="message"
        name="message"
        placeholder="Enter your message"
        rows="6"
        required
      ></textarea>

      <button type="submit">Send Message</button>
    </form>

    <p id="form-status"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
